version: '3'

dotenv: ['.env']

tasks:
  default: 
    cmd: task --list-all
    silent: true

  up:
    desc: Start all services
    cmds:
      - docker compose up -d
    silent: true

  down:
    desc: Stop and remove all containers
    cmds:
      - docker compose down
    silent: true

  restart:
    desc: Restart all services
    cmds:
      - docker compose restart
    silent: true

  build:
    desc: Build or rebuild services
    cmds:
      - docker compose build
    silent: true
  
  ngrok:
    desc: Start ngrok
    cmds:
      - TARGET_HOST=host.docker.internal docker compose up -d ngrok
    silent: true

  migrate:
    desc: Run migrations
    deps: [postgres]
    cmds:
      - docker compose up -d migrations
    silent: true
  
  postgres:
    desc: Start postgres
    cmds:
      - docker compose up -d postgres
    silent: true

  aspire:
    desc: Start aspire
    cmds:
      - docker compose up -d aspire
    silent: true

  debug:
    desc: Start server in debug mode
    deps: [migrate, ngrok, postgres, aspire]
    silent: true
