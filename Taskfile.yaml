version: '3'

tasks:
  default: 
    cmd: task --list-all
    silent: true

  up:
    desc: Start all services
    cmds:
      - docker compose up -d
    silent: true

  down:
    desc: Stop and remove all containers
    cmds:
      - docker compose down
    silent: true

  restart:
    desc: Restart all services
    cmds:
      - docker compose restart
    silent: true

  build:
    desc: Build or rebuild services
    cmds:
      - docker compose build server
    silent: true
