app = 'wasabi-bot-lavalink'
primary_region = 'dfw'

[build]
  dockerfile = 'infra/lavalink/Dockerfile'

[env]
  SERVER_PORT = '2333'
  _JAVA_OPTIONS = '-Xms512m -Xmx768m'

[[services]]
  protocol = 'tcp'
  internal_port = 2333
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
