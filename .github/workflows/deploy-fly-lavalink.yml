name: Deploy Fly Lavalink

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
      - 'infra/lavalink/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/tests.yml
    with:
      dotnet-version: 10.0.x

  deploy:
    name: Deploy shared Lavalink to Fly
    runs-on: ubuntu-latest
    needs: tests
    concurrency:
      group: deploy-fly-lavalink
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Lavalink app exists
        run: flyctl apps create wasabi-bot-lavalink || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Validate Lavalink config
        run: flyctl config validate -c infra/lavalink/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Set Lavalink secrets
        run: flyctl secrets set LAVALINK_SERVER_PASSWORD="${{ secrets.LAVALINK_PASSWORD }}" -a wasabi-bot-lavalink
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy shared Lavalink
        run: flyctl deploy . --remote-only --config infra/lavalink/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
