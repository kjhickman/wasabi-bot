name: Deploy Staging

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "infra/lavalink/**"
      - ".github/workflows/**"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "src/WasabiBot.Api/fly.db.toml"
      - "src/WasabiBot.Api/fly.staging.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect deploy changes
    runs-on: ubuntu-latest
    outputs:
      lavalink: ${{ steps.filter.outputs.lavalink }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        shell: bash
        run: |
          range=""

          if [[ -n "${{ github.event.before }}" ]] && [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            range="${{ github.event.before }}..${{ github.sha }}"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            range="HEAD^..HEAD"
          fi

          if [[ -z "$range" ]]; then
            echo "lavalink=true" >> "$GITHUB_OUTPUT"
            echo "app=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$range")"
          lavalink='false'
          app='false'

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue

            case "$file" in
              infra/lavalink/*|infra/lavalink/**|.github/workflows/deploy-lavalink.yml|.github/workflows/deploy-staging.yml|.github/workflows/deploy-prod.yml)
                lavalink='true'
                ;;
            esac

            case "$file" in
              src/*|src/**|Directory.Build.props|Directory.Packages.props|.github/workflows/deploy.yml|.github/workflows/deploy-db.yml|.github/workflows/deploy-staging.yml|.github/workflows/deploy-prod.yml|src/WasabiBot.Api/fly.db.toml|src/WasabiBot.Api/fly.staging.toml|src/WasabiBot.Api/fly.prod.toml)
                app='true'
                ;;
            esac
          done <<< "$changed_files"

          echo "lavalink=$lavalink" >> "$GITHUB_OUTPUT"
          echo "app=$app" >> "$GITHUB_OUTPUT"

  tests:
    needs: changes
    uses: ./.github/workflows/tests.yml
    with:
      dotnet-version: 10.0.x

  lavalink:
    needs: [changes, tests]
    if: needs.changes.outputs.lavalink == 'true'
    uses: ./.github/workflows/deploy-lavalink.yml
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      LAVALINK_PASSWORD: ${{ secrets.LAVALINK_PASSWORD }}

  deploy:
    needs: [changes, tests]
    if: needs.changes.outputs.app == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      fly-app: wasabi-bot-staging
      fly-config: src/WasabiBot.Api/fly.staging.toml
      lavalink-base-url: https://wasabi-bot-lavalink.fly.dev
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
      LAVALINK_PASSWORD: ${{ secrets.LAVALINK_PASSWORD }}
