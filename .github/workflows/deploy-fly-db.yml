name: Deploy Fly Database Config

on:
  workflow_call:
    inputs:
      fly-config:
        description: Fly config file for the database app.
        required: false
        default: src/WasabiBot.Api/fly.db.toml
        type: string
      fly-image:
        description: Fly image to deploy for the database app.
        required: false
        default: flyio/postgres-flex:17.2
        type: string
    secrets:
      FLY_API_TOKEN:
        description: Fly API token used for database config deployment.
        required: true

permissions:
  contents: read

jobs:
  deploy-db-config:
    name: Deploy database config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect database config changes
        id: changes
        shell: bash
        run: |
          range=""

          if [[ "${{ github.event_name }}" == "push" ]] && [[ -n "${{ github.event.before }}" ]] && [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            range="${{ github.event.before }}..${{ github.sha }}"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            range="HEAD^..HEAD"
          fi

          if [[ -z "$range" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$range" -- "${{ inputs.fly-config }}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            status=$?

            if [[ "$status" -eq 1 ]]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "Failed to diff database config changes for range '$range'" >&2
              exit "$status"
            fi
          fi

      - name: Setup Flyctl
        if: steps.changes.outputs.changed == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate database config
        if: steps.changes.outputs.changed == 'true'
        run: flyctl config validate -c "${{ inputs.fly-config }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy database config
        if: steps.changes.outputs.changed == 'true'
        run: flyctl deploy --config "${{ inputs.fly-config }}" --image "${{ inputs.fly-image }}" --remote-only --update-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
