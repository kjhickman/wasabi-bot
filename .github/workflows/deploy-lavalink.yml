name: Deploy Lavalink

on:
  workflow_call:
    secrets:
      FLY_API_TOKEN:
        required: true
      LAVALINK_PASSWORD:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy shared Lavalink to Fly
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-lavalink
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Lavalink app exists
        run: flyctl apps create wasabi-bot-lavalink --org wasabi-bot || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Validate Lavalink config
        run: flyctl config validate -c infra/lavalink/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Set Lavalink secrets
        run: flyctl secrets set LAVALINK_SERVER_PASSWORD="${{ secrets.LAVALINK_PASSWORD }}" -a wasabi-bot-lavalink
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy shared Lavalink
        run: flyctl deploy . --remote-only --config infra/lavalink/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
