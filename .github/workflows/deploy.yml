name: Deploy to Production

on:
  push:
    branches:
      - main

env:
  API_GATEWAY_URL: ${{ secrets.API_GATEWAY_URL }}
  ARCHITECTURE: x86_64
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  DISCORD_PUBLIC_KEY: ${{ secrets.DISCORD_PUBLIC_KEY }}
  DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
  DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
  ENVIRONMENT: 'prd'
  NEON_CONNECTION_STRING: ${{ secrets.NEON_CONNECTION_STRING }}

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Set up .NET Core
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Restore the project
      - name: Restore project
        run: dotnet restore src/WasabiBot.MigrationsRunner

      # Build the project
      - name: Build project
        run: dotnet build src/WasabiBot.MigrationsRunner --no-restore --tl

      # Migrate the database
      - name: Migrate database
        run: dotnet run --project src/WasabiBot.MigrationsRunner --no-build --tl

  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v2

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build the Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/wasabi-bot:$ENVIRONMENT . -f src/WasabiBot/Dockerfile

      # Push the image to ECR
      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/wasabi-bot:$ENVIRONMENT

      # Set up .NET Core
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Restore CDKTF Assets
      - name: Restore CDKTF Assets
        run: |
          dotnet restore src/WasabiBot.Terraform

      # Deploy via CDKTF
      - name: Run Terraform CDK
        uses: hashicorp/terraform-cdk-action@v5
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          mode: auto-approve-apply
          stackName: WasabiBot.Terraform
          workingDirectory: ./src/WasabiBot.Terraform

      # Warm up lambda
      - name: Warm up Lambda
        run: |
          curl ${{ secrets.API_GATEWAY_URL }}
