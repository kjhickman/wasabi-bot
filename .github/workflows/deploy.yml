name: Deploy

on:
  workflow_run:
    workflows: ["Build and Test"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        default: 'prd'
        type: choice
        options:
          - prd
          - stg

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'stg' }}

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Set environment-specific variables
      - name: Set environment-specific variables
        id: vars
        run: |
          case "$ENVIRONMENT" in
            "stg")
              echo "ConnectionStrings__Postgres=${{ secrets.STG_PG_CONNECTION_STRING }}" >> $GITHUB_ENV
              ;;
            "prd")
              echo "ConnectionStrings__Postgres=${{ secrets.PRD_PG_CONNECTION_STRING }}" >> $GITHUB_ENV
              ;;
          esac

      # Set up .NET Core
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      # Restore the project
      - name: Restore project
        run: dotnet restore tools/WasabiBot.MigrationsRunner

      # Build the project
      - name: Build project
        run: dotnet build tools/WasabiBot.MigrationsRunner --no-restore --tl

      # Migrate the database
      - name: Migrate database
        run: dotnet run --project tools/WasabiBot.MigrationsRunner --no-build --tl
  
  commands:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Set environment-specific variables
      - name: Set environment-specific variables
        id: vars
        run: |
          case "$ENVIRONMENT" in
            "stg")
              echo "DISCORD_TOKEN=${{ secrets.STG_DISCORD_TOKEN }}" >> $GITHUB_ENV
              ;;
            "prd")
              echo "DISCORD_TOKEN=${{ secrets.PRD_DISCORD_TOKEN }}" >> $GITHUB_ENV
              ;;
          esac

      # Set up .NET Core
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      # Restore the project
      - name: Restore project
        run: dotnet restore tools/WasabiBot.CommandsTool

      # Build the project
      - name: Build project
        run: dotnet build tools/WasabiBot.CommandsTool --no-restore --tl

      # Register commands
      - name: Register commands
        run: dotnet run $DISCORD_TOKEN --project tools/WasabiBot.CommandsTool --no-build --tl

  deploy:
    runs-on: ubuntu-latest
    needs: [migrate, commands] # terraform,
    concurrency:
      group: $ENVIRONMENT
      cancel-in-progress: false
    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Setup Flyctl
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # Deploy to Fly.io
      - name: Deploy to Fly.io
        run: flyctl deploy --config ./src/WasabiBot.Web/fly.$ENVIRONMENT.toml --dockerfile ./src/WasabiBot.Web/Dockerfile --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}