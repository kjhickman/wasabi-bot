name: Deploy

on:
  push:
    branches: [ main, aspire ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        default: 'prd'
        type: choice
        options:
          - prd
          - stg

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'stg' }}

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Set environment-specific variables
      - name: Set environment-specific variables
        id: vars
        run: |
          case "$ENVIRONMENT" in
            "stg")
              echo "ConnectionStrings__wasabiBotDb=${{ secrets.STG_PG_CONNECTION_STRING }}" >> $GITHUB_ENV
              ;;
            "prd")
              echo "ConnectionStrings__wasabiBotDb=${{ secrets.PRD_PG_CONNECTION_STRING }}" >> $GITHUB_ENV
              ;;
          esac

      # Set up .NET Core
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Restore the project
      - name: Restore project
        run: dotnet restore tools/WasabiBot.MigrationsRunner

      # Build the project
      - name: Build project
        run: dotnet build tools/WasabiBot.MigrationsRunner --no-restore --tl

      # Migrate the database
      - name: Migrate database
        run: dotnet run --project tools/WasabiBot.MigrationsRunner --no-build --tl

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      id-token: write
      contents: read

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up .NET Core
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
        
      # Restore the project
      - name: Restore project
        run: dotnet restore infra/WasabiBot.Terraform

      # Build the project
      - name: Build project
        run: dotnet build infra/WasabiBot.Terraform --no-restore
      
      # Run CDKTF
      - name: Run CDKTF
        run: dotnet run $ENVIRONMENT --project infra/WasabiBot.Terraform --no-build

      # Set up Terraform
      - uses: hashicorp/setup-terraform@v3

      # Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: us-east-1

      # Initialize Terraform backend
      - name: Terraform init
        run: terraform -chdir=cdktf.out/stacks/WasabiBot.Terraform init

      # Apply Terraform
      - name: Terraform apply
        run: terraform -chdir=cdktf.out/stacks/WasabiBot.Terraform apply -auto-approve
