name: Deploy to Fly

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name.
        required: true
        type: string
      fly-config:
        description: Fly config file to deploy.
        required: true
        type: string
    secrets:
      FLY_API_TOKEN:
        description: Fly API token used for Fly deployments.
        required: true
      DB_CONNECTION_STRING:
        description: Database connection string for migrations.
        required: true

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x

jobs:
  tests:
    uses: ./.github/workflows/tests.yml
    with:
      dotnet-version: 10.0.x

  db-config:
    needs: tests
    uses: ./.github/workflows/deploy-fly-db.yml
    with:
      fly-config: src/WasabiBot.Api/fly.db.toml
      fly-image: flyio/postgres-flex:17.2
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  migrate:
    name: Run migrations for ${{ inputs.environment }}
    runs-on: ubuntu-24.04-arm
    needs: db-config
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Export connection string
        run: echo "ConnectionStrings__wasabi_db=${{ secrets.DB_CONNECTION_STRING }}" >> "$GITHUB_ENV"

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Start Fly Postgres proxy
        run: flyctl proxy 15432:5432 -a wasabi-db > /tmp/fly-proxy.log 2>&1 &
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for Fly Postgres proxy
        run: |
          python3 - <<'PY'
          import socket
          import time

          deadline = time.time() + 30
          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 15432), timeout=1):
                      print("proxy ready")
                      break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("Fly Postgres proxy did not become ready in time")
          PY

      - name: Setup .NET
        uses: fast-actions/setup-dotnet@v1
        with:
          sdk-version: ${{ env.DOTNET_VERSION }}

      - name: Restore migrations project
        run: dotnet restore WasabiBot.slnx

      - name: Build migrations project
        run: dotnet build src/WasabiBot.Migrations/WasabiBot.Migrations.csproj --configuration Release --no-restore

      - name: Apply migrations
        run: dotnet run --project src/WasabiBot.Migrations/WasabiBot.Migrations.csproj --configuration Release --no-build

      - name: Show Fly proxy log on failure
        if: failure()
        run: cat /tmp/fly-proxy.log

  deploy:
    name: Deploy ${{ inputs.environment }} to Fly
    runs-on: ubuntu-latest
    needs: db-config
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-fly-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy app
        run: flyctl deploy . --remote-only --config "${{ inputs.fly-config }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
