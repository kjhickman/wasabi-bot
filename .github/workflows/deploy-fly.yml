name: Deploy to Fly

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name.
        required: true
        type: string
      fly-config:
        description: Fly config file to deploy.
        required: true
        type: string

permissions:
  contents: read

jobs:
  tests:
    uses: ./.github/workflows/tests.yml
    with:
      dotnet-version: 10.0.x

  deploy:
    name: Deploy ${{ inputs.environment }} to Fly
    runs-on: ubuntu-latest
    needs: tests
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-fly-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy app
        run: flyctl deploy --remote-only --config "${{ inputs.fly-config }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
