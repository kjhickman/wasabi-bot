name: Deploy Fly Production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy-fly.yml
    with:
      environment: prod
      fly-config: src/WasabiBot.Api/fly.prod.toml
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
