version: '3'

dotenv: ['.env']

tasks:
  default: task --list
  
  build:
    desc: Build the Docker image
    cmds:
      - docker build -t ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/wasabi-bot:${ENVIRONMENT} . -f src/WasabiBot.Web/Dockerfile

  push:
    desc: Push the image to ECR
    deps: [build, auth]
    cmds:
      - docker push ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/wasabi-bot:${ENVIRONMENT}

  restore:
    desc: Restore assets for CDKTF
    cmds:
      - dotnet restore infra/WasabiBot.Terraform
  
  deploy:
      desc: Deploy via CDKTF
      deps: [push, restore]
      dir: infra/WasabiBot.Terraform
      cmds:
        - cdktf deploy --auto-approve
        - curl ${DEV_WARMUP_URL}

  auth:
    desc: Authenticate with ECR
    cmds:
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com

  migrate:
    desc: Migrate the database
    cmds:
      - dotnet run --project infra/WasabiBot.MigrationsRunner
