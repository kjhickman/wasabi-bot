# See https://fly.io/docs/reference/configuration/ or https://json.schemastore.org/fly.json for info

app = 'prd-wasabi-bot-web'
primary_region = 'dfw'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  ASPNETCORE_ENVIRONMENT = "Production"
  AWS_ROLE_ARN = "arn:aws:iam::346610971261:role/prd-wasabi-bot-web-fly-role"
